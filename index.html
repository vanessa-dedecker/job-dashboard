function getDaysSince(dateStr) {
  if (!dateStr) return null;
  const parts = dateStr.split('/');
  if (parts.length !== 3) return null;
  const d = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  if (isNaN(d.getTime())) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

      <div className="no-print" style={{ background:'#fff', borderBottom:`1px solid ${C.greyMid}`, padding:'8px 24px', display:'flex', alignItems:'center', gap:12 }}>
        <button onClick={onToggle} style={{ background:'none', border:'none', cursor:'pointer', color:C.blue, fontWeight:700, fontSize:'.8rem', display:'flex', alignItems:'center', gap:6 }}>
          📊 Afficher les statistiques ▼
        </button>
        {relanceAlerts > 0 && (
          <span className="relance-pulse" style={{ background:'#FFF3CD', color:'#856404', padding:'3px 10px', borderRadius:20, fontSize:'.75rem', fontWeight:700 }}>
            ⏰ {relanceAlerts} relance{relanceAlerts>1?'s':''} à faire
          </span>
        )}
      </div>
    );
  }

  const funnel = [
    { label:'À contacter', n:pipeline.aContacter, color:'#FFF3CD', tc:'#856404' },
    { label:'Contactées',  n:pipeline.contacte,   color:'#D4EDDA', tc:'#155724' },
    { label:'Relancées',   n:pipeline.relance,     color:'#CCE5FF', tc:'#004085' },
    { label:'Entretiens',  n:pipeline.entretien + pipeline.proposition, color:'#F3E8FF', tc:'#4A1870' },
    { label:'Gagnées 🎉',  n:pipeline.accepte,    color:'#C3E6CB', tc:'#155724' },
  ];

  return (
    <div className="no-print" style={{ background:'#fff', borderBottom:`1px solid ${C.greyMid}`, padding:'14px 24px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
        <div style={{ fontWeight:700, color:C.navy, fontSize:'.88rem' }}>📊 Tableau de bord — Pipeline candidatures</div>
        <button onClick={onToggle} style={{ background:'none', border:'none', cursor:'pointer', color:C.textSub, fontSize:'.78rem' }}>Réduire ▲</button>
      </div>

      {/* Funnel */}
      <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap', marginBottom:14 }}>
        {funnel.map((f,i) => (
          <React.Fragment key={i}>
            <div style={{ textAlign:'center', minWidth:70 }}>
              <div style={{ background:f.color, color:f.tc, borderRadius:10, padding:'8px 14px', fontWeight:800, fontSize:'1.3rem', marginBottom:4 }}>{f.n}</div>
              <div style={{ fontSize:'.68rem', color:C.textSub, fontWeight:600, lineHeight:1.2 }}>{f.label}</div>
            </div>
            {i < funnel.length-1 && <div style={{ color:C.greyMid, fontSize:'1.2rem', fontWeight:300 }}>→</div>}
          </React.Fragment>
        ))}

        {/* Séparateur */}
        <div style={{ width:1, background:C.greyMid, height:50, margin:'0 8px' }} />

        {/* Métriques */}
        <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
          {[
            { n:`${tauxContact}%`, label:'Taux de contact', color:C.blue },
            { n:`${tauxEntretien}%`, label:'Taux entretien', color:'#7B3F9E' },
            { n:pipeline.refus, label:'Refus / Sans réponse', color:'#721C24' },
          ].map((m,i) => (
            <div key={i} style={{ textAlign:'center', minWidth:70 }}>
              <div style={{ fontSize:'1.3rem', fontWeight:800, color:m.color }}>{m.n}</div>
              <div style={{ fontSize:'.68rem', color:C.textSub, fontWeight:600, lineHeight:1.2 }}>{m.label}</div>
            </div>
          ))}
        </div>

        {/* Alerte relance */}
        {relanceAlerts > 0 && (
          <div className="relance-pulse" style={{ marginLeft:'auto', background:'#FFF3CD', border:'1.5px solid #FFC107', borderRadius:10, padding:'8px 14px', textAlign:'center' }}>
            <div style={{ fontSize:'1.1rem', fontWeight:800, color:'#856404' }}>⏰ {relanceAlerts}</div>
            <div style={{ fontSize:'.68rem', color:'#856404', fontWeight:600 }}>À relancer</div>
          </div>
        )}
      </div>

      {/* Barre progression */}
      <div style={{ background:C.greyMid, borderRadius:20, height:8, overflow:'hidden' }}>
        <div style={{ height:'100%', borderRadius:20, background:`linear-gradient(90deg, ${C.blue} 0%, #1E7145 100%)`, width:`${tauxContact}%`, transition:'width .5s ease' }} />
      </div>
      <div style={{ fontSize:'.7rem', color:C.textSub, marginTop:4 }}>{contacted} offre{contacted>1?'s':''} contactée{contacted>1?'s':''} sur {actives} actives</div>
    </div>
  );
}

// COMPOSANT : MODAL MESSAGE (avec onglet Lettre de motivation)
// ══════════════════════════════════════════════════════════════════
function MessageModal({ offer, profile, onClose, onToast }) {
  const [tab, setTab]     = useState('message');
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    const onKey = e => { if(e.key==='Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  const content = tab === 'message' ? offer.message : generateCoverLetter(offer, profile);
  const subject = tab === 'message' ? offer.sujet : `Candidature — ${offer.titre}`;

  const copy = async () => {
    await navigator.clipboard.writeText(content);
    setCopied(true);
    onToast(tab === 'message' ? 'Message copié !' : 'Lettre copiée !', 'success');
    setTimeout(() => setCopied(false), 3000);
  };

  const mailto = () => {
    const b = encodeURIComponent(content);
    const s = encodeURIComponent(subject);
    window.location.href = `mailto:?subject=${s}&body=${b}`;
  };

  return (
    <div className="no-print" onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.55)', zIndex:1000,
      display:'flex', alignItems:'center', justifyContent:'center', padding:16
    }}>
      <div onClick={e=>e.stopPropagation()} className="modal-anim" style={{
        background:'#fff', borderRadius:16, width:'100%', maxWidth:660,
        maxHeight:'90vh', display:'flex', flexDirection:'column',
        boxShadow:'0 20px 60px rgba(0,0,0,.25)'
      }}>
        {/* Header */}
        <div style={{ background:C.navy, padding:'18px 22px', borderRadius:'16px 16px 0 0', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <div style={{ color:C.gold, fontWeight:700, fontSize:'1rem' }}>{offer.titre}</div>
            <div style={{ color:'rgba(255,255,255,.7)', fontSize:'.78rem', marginTop:3 }}>
              {offer.plateforme} · {offer.entreprise} · {offer.tjm}
            </div>
          </div>
          <button onClick={onClose} style={{ background:'rgba(255,255,255,.15)', border:'none', color:'#fff', borderRadius:8, width:30, height:30, cursor:'pointer', fontSize:'1rem', display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
        </div>

        {/* Onglets */}
        <div style={{ display:'flex', borderBottom:`1px solid ${C.greyMid}` }}>
          {[['message','📋 Message LinkedIn/Email'],['lettre','📝 Lettre de motivation']].map(([k,l]) => (
            <button key={k} onClick={() => { setTab(k); setCopied(false); }} style={{
              flex:1, padding:'10px', border:'none', background: tab===k ? '#fff' : C.grey,
              color: tab===k ? C.navy : C.textSub, fontWeight: tab===k ? 700 : 500,
              cursor:'pointer', fontSize:'.82rem',
              borderBottom: tab===k ? `3px solid ${C.blue}` : '3px solid transparent',
              transition:'all .15s'
            }}>{l}</button>
          ))}
        </div>

        {/* Objet */}
        <div style={{ padding:'12px 22px 0', borderBottom:`1px solid ${C.greyMid}` }}>
          <div style={{ fontSize:'.72rem', color:C.textSub, fontWeight:600, textTransform:'uppercase', letterSpacing:.5, marginBottom:4 }}>
            {tab==='message' ? '📧 Objet email / LinkedIn' : '📄 Objet de la lettre'}
          </div>
          <div style={{ fontSize:'.88rem', fontWeight:700, color:C.navy, paddingBottom:12 }}>{subject}</div>
        </div>

        {/* Contenu */}
        <div style={{ flex:1, overflow:'auto', padding:'14px 22px' }}>
          <pre style={{
            fontFamily:'inherit', fontSize:'.85rem', lineHeight:1.65,
            whiteSpace:'pre-wrap', color:C.text, background:C.grey,
            padding:14, borderRadius:10, border:`1px solid ${C.greyMid}`
          }}>{content}</pre>
        </div>

        {/* Footer */}
        <div style={{ padding:'14px 22px', borderTop:`1px solid ${C.greyMid}`, display:'flex', gap:10, flexWrap:'wrap' }}>
          <button onClick={copy} style={{
            flex:1, minWidth:120, padding:'9px 14px', borderRadius:8, border:'none',
            background: copied ? '#1E7145' : C.blue, color:'#fff',
            fontWeight:700, fontSize:'.83rem', cursor:'pointer', transition:'background .2s'
          }}>
            {copied ? '✅ Copié !' : '📋 Copier'}
          </button>
          <button onClick={mailto} style={{
            flex:1, minWidth:120, padding:'9px 14px', borderRadius:8, border:`1.5px solid ${C.blue}`,
            background:'#fff', color:C.blue, fontWeight:700, fontSize:'.83rem', cursor:'pointer'
          }}>✉️ Envoyer par email</button>
          <a href={offer.lien} target="_blank" rel="noreferrer" style={{
            flex:1, minWidth:120, padding:'9px 14px', borderRadius:8,
            background:C.navy, color:'#fff', fontWeight:700, fontSize:'.83rem',
            textDecoration:'none', textAlign:'center', display:'block'
          }} title={offer.lienNote||"Voir l'offre sur la plateforme"}>
            🔗 {offer.lienNote ? 'Voir offre ⚠️' : "Voir l'offre"}
          </a>
        </div>
      </div>
    </div>
  );
}

// COMPOSANT : CARTE OFFRE

function OfferCard({ offer, statut, onMessage, onStatut }) {
  const [hovered, setHovered] = useState(false);
  const cat      = CAT_META[offer.cat]  || CAT_META.kyc;
  const sm       = STATUT_META[statut.statut] || STATUT_META['À contacter'];
  const fib      = FIABILITE_META[offer.fiabilite] || FIABILITE_META.inconnu;
  const excluded = statut.statut === 'Non contacté';

  const remoteColor = offer.remote.includes('Full Remote') ? '#1E7145'
    : offer.remote.toLowerCase().includes('hybride') ? '#C55A11' : '#7B3F9E';
  const remoteBg = offer.remote.includes('Full Remote') ? '#E2EFDA'
    : offer.remote.toLowerCase().includes('hybride') ? '#FCE4D6' : '#F3E8FF';

  // Alerte relance
  const daysSince  = getDaysSince(statut.date);
  const needRelance = statut.statut === 'Contacté' && daysSince !== null && daysSince >= 7;
  const sansRepLong = statut.statut === 'Sans réponse' && daysSince !== null && daysSince >= 14;

  return (
    <div className="card-anim" onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)} style={{
      background: excluded ? '#f5f5f5' : '#fff',
      borderRadius:14, overflow:'hidden',
      boxShadow: hovered ? '0 8px 32px rgba(31,56,100,.18)' : '0 2px 10px rgba(31,56,100,.08)',
      transition:'box-shadow .2s, transform .2s',
      transform: hovered ? 'translateY(-2px)' : 'none',
      display:'flex', flexDirection:'column',
      borderTop:`3px solid ${excluded ? '#ccc' : cat.color}`,
      opacity: excluded ? 0.55 : 1,
    }}>
      {/* Alerte relance */}
      {(needRelance || sansRepLong) && (
        <div className="relance-pulse" style={{
          background:'#FFF3CD', borderBottom:'1px solid #FFC107',
          padding:'5px 14px', fontSize:'.73rem', fontWeight:700, color:'#856404',
          display:'flex', alignItems:'center', gap:6
        }}>
          ⏰ {needRelance ? `À relancer — ${daysSince}j sans réponse` : `Sans réponse depuis ${daysSince}j`}
        </div>
      )}

      {/* Header carte */}
      <div style={{ padding:'14px 16px 10px', background:`linear-gradient(135deg, ${cat.bg} 0%, #fff 100%)` }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8, gap:8 }}>
          <span style={{
            background:cat.bg, color:cat.color, fontSize:'.7rem', fontWeight:700,
            padding:'3px 10px', borderRadius:20, whiteSpace:'nowrap'
          }}>{cat.label}</span>
          <StatutBadge statut={statut.statut} small />
        </div>
        <div style={{ fontWeight:700, fontSize:'.95rem', color:C.navy, lineHeight:1.35, marginBottom:4 }}>{offer.titre}</div>
        <div style={{ fontSize:'.75rem', color:C.textSub }}>📍 {offer.plateforme} · {offer.contact}</div>
      </div>

      {/* Body */}
      <div style={{ padding:'12px 16px', flex:1 }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px 12px', marginBottom:12 }}>

// EXPORT EXCEL
// ══════════════════════════════════════════════════════════════════
async function doExport(statuts) {
  const today = new Date().toLocaleDateString('fr-FR');
  const fname = `Suivi_Export_${today.replace(/\//g,'-')}.xlsx`;
  const wb = new ExcelJS.Workbook();
  wb.creator = 'Dashboard Vanessa';
  const ws = wb.addWorksheet('🔍 Suivi Missions', { views:[{ state:'frozen', ySplit:3 }] });
  ws.columns = [
    {key:'id',width:6},{key:'titre',width:38},{key:'plat',width:14},
    {key:'entr',width:26},{key:'sect',width:20},{key:'type',width:12},
    {key:'tjm',width:18},{key:'rem',width:26},{key:'stat',width:16},
    {key:'date',width:14},{key:'notes',width:30},{key:'lien',width:50},
  ];
  const solidFill = argb => ({ type:'pattern', pattern:'solid', fgColor:{argb} });
  const thinBorder = () => { const s={style:'thin',color:{argb:'FFCCCCCC'}}; return {top:s,bottom:s,left:s,right:s}; };
  const medBorder  = () => { const s={style:'medium',color:{argb:'FF162B50'}}; return {top:s,bottom:s,left:s,right:s}; };
  const NAVY='FF1F3864', BLUEMID='FF2E75B6', GOLD='FFC9A227', WHITE='FFFFFFFF', ODD='FFEEF4FB';
  const SS = {
    'À contacter' :{ fill:'FFFFF3CD', font:'FF856404' },
    'Contacté'    :{ fill:'FFD4EDDA', font:'FF155724' },
    'Non contacté':{ fill:'FFE8E8E8', font:'FF666666' },
    'Relancé'     :{ fill:'FFCCE5FF', font:'FF004085' },
    'Entretien'   :{ fill:'FFF3E8FF', font:'FF4A1870' },
    'Proposition' :{ fill:'FFD1ECF1', font:'FF117A8B' },
    'Accepté'     :{ fill:'FFC3E6CB', font:'FF155724' },
    'Refus'       :{ fill:'FFF8D7DA', font:'FF721C24' },
    'Sans réponse':{ fill:'FFE2E3E5', font:'FF383D41' },
  };
  const r1 = ws.addRow(['📋   SUIVI MISSIONS FREELANCE  ·  Vanessa De Decker  |  DMOS · KYC/LCB-FT  |  Full Remote',...Array(11).fill('')]);
  r1.height = 38; ws.mergeCells(1,1,1,12);
  const c1 = ws.getCell('A1');
  c1.fill=solidFill(NAVY); c1.font={name:'Calibri',bold:true,size:15,color:{argb:GOLD}};
  c1.alignment={horizontal:'center',vertical:'middle'}; c1.border=medBorder();
  const r2 = ws.addRow([`Dernière mise à jour : ${today}   ·   Veille FREELANCE  ·  Full Remote / Hybride`,...Array(11).fill('')]);
  r2.height=24; ws.mergeCells(2,1,2,12);
  const c2=ws.getCell('A2');
  c2.fill=solidFill(BLUEMID); c2.font={name:'Calibri',size:10,color:{argb:WHITE}};
  c2.alignment={horizontal:'center',vertical:'middle'};
  const r3 = ws.addRow(['ID','Titre','Plateforme','Entreprise','Secteur','Type','TJM','Remote','Statut','Date statut','Notes','Lien']);
  r3.height=30;
  r3.eachCell(cell=>{ cell.fill=solidFill(NAVY); cell.font={name:'Calibri',bold:true,size:10,color:{argb:WHITE}}; cell.alignment={horizontal:'center',vertical:'middle'}; cell.border=medBorder(); });
  OFFERS.forEach((o,ri) => {
    const st = statuts[o.id] || { statut:'À contacter', date:'', notes:'' };
    const bg = ri%2===0 ? ODD : 'FFFFFFFF';
    const ss = SS[st.statut] || SS['À contacter'];
    let sF='FFD6E4F0',sFt='FF1F3864';
    if((o.secteur||'').match(/Médical|Pharma|Dispositif/)){ sF='FFFFF3CD'; sFt='FF7B3A00'; }
    else if((o.secteur||'').includes('Assurance')){ sF='FFEDE0F5'; sFt='FF4A1870'; }
    let rF=o.remote.includes('Full Remote')?'FFD4EDDA':o.remote.toLowerCase().includes('hybride')?'FFFFE5D0':'FFFFF3CD';
    let rFt=o.remote.includes('Full Remote')?'FF155724':o.remote.toLowerCase().includes('hybride')?'FF7B3A00':'FF856404';
    const row = ws.addRow([o.id,o.titre,o.plateforme,o.entreprise,o.secteur,o.type||'',o.tjm,o.remote,st.statut,st.date||'',st.notes||'',o.lien]);
    row.height=36;
    row.eachCell({includeEmpty:true},(cell,ci)=>{
      let fill=bg, fnt='FF333333', bold=false;
      if(ci===1){fnt='FF1F3864';bold=true;}
      else if(ci===2){fnt='FF1F3864';bold=true;}
      else if(ci===3){fnt='FF2E75B6';bold=true;}
      else if(ci===5){fill=sF;fnt=sFt;bold=true;}
      else if(ci===7){fill='FFD4EDDA';fnt='FF155724';bold=true;}
      else if(ci===8){fill=rF;fnt=rFt;bold=true;}
      else if(ci===9){fill=ss.fill;fnt=ss.font;bold=true;}
      else if(ci===10){fnt='FF555555';}
      else if(ci===12){fnt='FF2E75B6';}
      cell.fill=solidFill(fill); cell.font={name:'Calibri',bold,size:10,color:{argb:fnt}};
      cell.alignment={horizontal:[1,3,6,7,8,9,10].includes(ci)?'center':'left',vertical:'middle',wrapText:ci===2||ci===11};
      cell.border=thinBorder();
    });
  });
  const buf  = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=fname; a.click();
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════════════════════════
// APP PRINCIPALE
// ══════════════════════════════════════════════════════════════════
function App() {
  const [statuts,      setStatuts]      = useState(loadStatuts);
  const [profile,      setProfile]      = useState(() => loadProfile() || DEFAULT_PROFILE);
  const [catFilter,    setCatFilter]    = useState('all');
  const [statFilter,   setStatFilter]   = useState('all');
  const [search,       setSearch]       = useState('');
  const [msgOffer,     setMsgOffer]     = useState(null);
  const [statOffer,    setStatOffer]    = useState(null);
  const [toasts,       setToasts]       = useState([]);
  const [exporting,    setExporting]    = useState(false);
  const [showProfile,  setShowProfile]  = useState(false);
  const [showKeywords, setShowKeywords] = useState(false);
  const [showStats,    setShowStats]    = useState(true);
  const [firstVisit,   setFirstVisit]   = useState(() => !localStorage.getItem(PROFILE_KEY));
  const toastId = useRef(0);

  const addToast = useCallback((msg, type='info') => {
    const id = ++toastId.current;
    setToasts(prev => [...prev, { id, msg, type, leaving:false }]);
    setTimeout(() => setToasts(prev => prev.map(t => t.id===id ? {...t,leaving:true} : t)), 2700);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id!==id)), 3000);
  }, []);

  const updateStatut = useCallback((id, statut, notes) => {
    setStatuts(prev => {
      const old = prev[id] || { statut:'À contacter', date:null, notes:'', historique:[] };
      const hist = old.statut && old.statut !== statut
        ? [...(old.historique||[]), { statut:old.statut, date:old.date }]
        : (old.historique || []);
      const next = { ...prev, [id]: { statut, date:new Date().toLocaleDateString('fr-FR'), notes, historique:hist } };
      saveStatuts(next);
      return next;
    });
    addToast(`Statut mis à jour : ${statut}`, 'success');
    setStatOffer(null);
  }, [addToast]);

  const handleSaveProfile = useCallback((p) => {
    persistProfile(p);
    setProfile(p);
    setShowProfile(false);
    setFirstVisit(false);
    addToast('Profil enregistré !', 'success');
  }, [addToast]);

  // Filtrage
  const visible = useMemo(() => {
    let list = OFFERS;
    if (catFilter !== 'all') list = list.filter(o => o.cat === catFilter);
    if (statFilter === 'active') list = list.filter(o => {
      const s = (statuts[o.id]||{}).statut||'À contacter';
      return ['Contacté','Relancé','Entretien','Proposition'].includes(s);
    });
    if (statFilter === 'pending') list = list.filter(o => {
      const s = (statuts[o.id]||{}).statut||'À contacter';
      return ['À contacter','Sans réponse'].includes(s);
    });
    else if (statFilter === 'exclus') list = list.filter(o => {
      return (statuts[o.id]||{}).statut === 'Non contacté';
    });
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(o =>
        o.titre.toLowerCase().includes(q) ||
        o.plateforme.toLowerCase().includes(q) ||
        o.secteur.toLowerCase().includes(q) ||
        o.entreprise.toLowerCase().includes(q) ||
        o.remote.toLowerCase().includes(q)
      );
    }
    return list;
  }, [catFilter, statFilter, search, statuts]);

  // Stats
  const stats = useMemo(() => {
    let contacte=0, relance=0, entretien=0, gagne=0;
    OFFERS.forEach(o => {
      const s = (statuts[o.id]||{}).statut||'À contacter';
      if (s==='Contacté') contacte++;
      if (s==='Relancé')  relance++;
      if (['Entretien','Proposition'].includes(s)) entretien++;
      if (s==='Accepté') gagne++;
    });
    const actives = OFFERS.filter(o => (statuts[o.id]||{}).statut !== 'Non contacté').length;
    return { total:OFFERS.length, actives, contacte, relance, entretien, gagne };
  }, [statuts]);

  const handleExport = async () => {
    setExporting(true);
    try {
      await doExport(statuts);
      addToast('Fichier Excel exporté !', 'success');
    } catch(e) {
      addToast("Erreur lors de l'export", 'error');
    }
    setExporting(false);
  };

  const handlePrint = () => {
    addToast('Ouverture impression PDF...', 'info');
    setTimeout(() => window.print(), 500);
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      <Header
        stats={stats}
        profile={profile}
        onExport={handleExport}
        exporting={exporting}
        onPrint={handlePrint}
        onProfile={() => setShowProfile(true)}
        onKeywords={() => setShowKeywords(true)}
      />
      <StatsPanel statuts={statuts} visible={showStats} onToggle={() => setShowStats(v=>!v)} />
      <FilterBar
        catFilter={catFilter} setCatFilter={setCatFilter}
        statutFilter={statFilter} setStatutFilter={setStatFilter}
        search={search} setSearch={setSearch}
        total={OFFERS.length} shown={visible.length}
      />

      {/* Grille cartes */}
      <main className="no-print" style={{ flex:1, padding:'20px 24px', maxWidth:1400, margin:'0 auto', width:'100%' }}>
        {visible.length === 0 ? (
          <div style={{ textAlign:'center', padding:'60px 20px', color:C.textSub }}>
            <div style={{ fontSize:'3rem', marginBottom:12 }}>🔍</div>
            <div style={{ fontSize:'1.1rem', fontWeight:700, marginBottom:6 }}>Aucune offre trouvée</div>
            <div style={{ fontSize:'.85rem' }}>Essayez d'autres filtres ou effacez la recherche</div>
          </div>
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(340px, 1fr))', gap:18 }}>
            {visible.map(o => (
              <OfferCard
                key={o.id}
                offer={o}
                statut={statuts[o.id] || { statut:'À contacter', date:null, notes:'', historique:[] }}
                onMessage={setMsgOffer}
                onStatut={setStatOffer}
              />
            ))}
          </div>
        )}
      </main>

      {/* Table impression PDF */}
      <PrintTable statuts={statuts} profile={profile} />

      {/* Footer */}
      <footer className="no-print" style={{ padding:'14px 24px', background:C.navy, color:'rgba(255,255,255,.5)', fontSize:'.72rem', textAlign:'center' }}>
        {profile.nom} · DMOS ⭐ · Gestion Contrats ⭐ · KYC/LCB-FT · Full Remote · Freelance · CDI · CDD · Intérim
        <br/><span style={{color:'rgba(255,255,255,.3)'}}>Statuts sauvegardés dans ce navigateur · Les liens ⚠️ redirigent vers la page générale — vérifier manuellement</span>
      </footer>

      {/* Modals */}
      {msgOffer && <MessageModal offer={msgOffer} profile={profile} onClose={() => setMsgOffer(null)} onToast={addToast} />}
      {statOffer && (
        <StatutModal
          offer={statOffer}
          current={statuts[statOffer.id] || { statut:'À contacter', date:null, notes:'', historique:[] }}
          onSave={(s,n) => updateStatut(statOffer.id, s, n)}
          onClose={() => setStatOffer(null)}
        />
      )}
      {(showProfile || firstVisit) && (
        <ProfileModal
          profile={profile}
          onSave={handleSaveProfile}
          onClose={() => setShowProfile(false)}
          isFirst={firstVisit}
        />
      )}
      {showKeywords && <KeywordsModal onClose={() => setShowKeywords(false)} onToast={addToast} />}

      <Toast toasts={toasts} />
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MOUNT
// ══════════════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
